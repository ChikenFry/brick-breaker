<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<!--
  viewport: width=device-width stops mobile browsers from zooming out.
  user-scalable=no prevents pinch-zoom interfering with touch paddle control.
-->
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Brick Breaker</title>
<style>
/* Zero-CSS goal: only layout essentials — no decorative styles at all */
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #111; display: flex; flex-direction: column; align-items: center; touch-action: none; }
canvas { display: block; }
#msg { color: #fff; font: 13px monospace; height: 20px; text-align: center; padding-top: 3px; }
#joinScreen {
  min-height: 100vh;
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font: 14px monospace;
  padding: 16px;
}
#joinForm {
  display: flex;
  flex-direction: column;
  gap: 10px;
  width: min(320px, 90vw);
}
#joinForm input,
#joinForm button {
  font: 14px monospace;
  padding: 10px;
  border: 1px solid #444;
  background: #1d1d1d;
  color: #fff;
}
#joinForm button {
  cursor: pointer;
}
#joinHelp {
  color: #aaa;
  font-size: 12px;
}
#joinError {
  color: #ff7b7b;
  font-size: 12px;
  min-height: 14px;
}
</style>
</head>
<body>

<div id="joinScreen">
  <form id="joinForm" novalidate>
    <label for="nameInput">Enter your name</label>
    <input id="nameInput" name="name" type="text" maxlength="16" autocomplete="nickname" placeholder="Player name" required>
    <button id="joinBtn" type="submit">Join Game</button>
    <div id="joinHelp">Name is shown above your paddle.</div>
    <div id="joinError"></div>
  </form>
</div>

<canvas id="c" hidden></canvas>
<div id="msg" hidden></div>

<script src="/socket.io/socket.io.js"></script>
<script>
// ── Canvas + scaling ──────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const msgEl  = document.getElementById('msg');
const joinScreen = document.getElementById('joinScreen');
const joinForm = document.getElementById('joinForm');
const nameInput = document.getElementById('nameInput');
const joinBtn = document.getElementById('joinBtn');
const joinError = document.getElementById('joinError');
const NAME_MIN = 2;
const NAME_MAX = 16;
let isJoining = false;
let joinTimeout = null;

// Logical game dimensions — filled in by server 'init' event
let LW = 400, LH = 600;   // logical width / height
let PAD_W = 80, PAD_H = 10, PAD_Y = 564, BALL_R = 7;

// scale = CSS pixels per logical unit; recomputed on resize
let scale = 1;

function resize() {
  // Fit the canvas into the available viewport width, preserving aspect ratio.
  // Leave 24px for the message bar below.
  const maxW = window.innerWidth;
  const maxH = window.innerHeight - 24;
  scale = Math.min(maxW / LW, maxH / LH);

  canvas.width  = Math.floor(LW * scale);
  canvas.height = Math.floor(LH * scale);
}

window.addEventListener('resize', resize);
resize();
nameInput.focus();
updateJoinButton();

// ── Socket ────────────────────────────────────────────────────────────────────
const socket = io({
  transports: ['websocket', 'polling'],
  autoConnect: false
});

let myId  = null;
let state = null;

socket.on('init', data => {
  clearTimeout(joinTimeout);
  joinTimeout = null;
  myId  = data.id;
  LW    = data.W;
  LH    = data.H;
  PAD_W = data.PAD_W;
  PAD_H = data.PAD_H;
  PAD_Y = data.PAD_Y;
  BALL_R = data.BALL_R;
  joinScreen.hidden = true;
  canvas.hidden = false;
  msgEl.hidden = false;
  resize();   // re-scale now we know real dimensions
});

// 's' = compact state event (keeps payload name short)
socket.on('s', s => { state = s; });

// Toast message
let msgTimer;
socket.on('msg', txt => {
  msgEl.textContent = txt;
  clearTimeout(msgTimer);
  msgTimer = setTimeout(() => { msgEl.textContent = ''; }, 2500);
});

socket.on('connect_error', err => {
  clearTimeout(joinTimeout);
  joinTimeout = null;
  isJoining = false;
  setJoinError('Failed to join: ' + err.message);
  updateJoinButton();
  msgEl.hidden = false;
  msgEl.textContent = '';
});

joinForm.addEventListener('submit', e => {
  e.preventDefault();
  const name = normalizeName(nameInput.value);
  const err = validateName(name);
  if (err) {
    setJoinError(err);
    updateJoinButton();
    nameInput.focus();
    return;
  }
  nameInput.value = name;
  setJoinError('');
  isJoining = true;
  updateJoinButton();
  socket.auth = { name };
  socket.connect();

  clearTimeout(joinTimeout);
  joinTimeout = setTimeout(() => {
    if (!myId) {
      isJoining = false;
      setJoinError('Join timed out. Please try again.');
      updateJoinButton();
    }
  }, 8000);
});

nameInput.addEventListener('input', () => {
  const name = normalizeName(nameInput.value);
  const err = validateName(name);
  setJoinError(err);
  updateJoinButton();
});

function normalizeName(value) {
  return (value || '').replace(/\s+/g, ' ').trim();
}

function validateName(name) {
  if (!name) return 'Name is required.';
  if (name.length < NAME_MIN) return 'Name must be at least 2 characters.';
  if (name.length > NAME_MAX) return 'Name must be 16 characters or fewer.';
  return '';
}

function setJoinError(message) {
  joinError.textContent = message;
}

function updateJoinButton() {
  joinBtn.disabled = isJoining;
}

// ── Paddle input ──────────────────────────────────────────────────────────────
// Convert a CSS-pixel x position into a logical paddle X and emit it.
function sendPaddle(cssX) {
  if (!myId) return;
  // Use my current padW from state if available, else fall back to init value
  const myPadW   = state?.players?.[myId]?.padW ?? PAD_W;
  const logicalX = cssX / scale - myPadW / 2;
  socket.emit('p', Math.max(0, Math.min(LW - myPadW, logicalX)));
}

// Mouse (desktop fallback)
canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  sendPaddle(e.clientX - r.left);
});

// Touch — use first active touch point
canvas.addEventListener('touchstart',  handleTouch, { passive: false });
canvas.addEventListener('touchmove',   handleTouch, { passive: false });

function handleTouch(e) {
  e.preventDefault();   // stop scroll / zoom interference
  const r     = canvas.getBoundingClientRect();
  const touch = e.touches[0];
  sendPaddle(touch.clientX - r.left);
}

// ── Brick row colours (simple, no glow) ──────────────────────────────────────
const BRICK_COLORS = ['#e63946', '#e9c46a', '#2a9d8f', '#457b9d'];

// ── Render loop ───────────────────────────────────────────────────────────────
function draw() {
  requestAnimationFrame(draw);

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (!state) {
    // Waiting for first state packet
    ctx.fillStyle = '#555';
    ctx.font = `${14 * scale}px monospace`;
    ctx.textAlign = 'center';
    ctx.fillText('Connecting...', canvas.width / 2, canvas.height / 2);
    return;
  }

  const s = scale;  // shorthand

  // ── Bricks ──────────────────────────────────────────────────────────────────
  for (const b of state.bricks) {
    if (!b.alive) continue;
    // Fade brick toward dark as hp drops (full brightness = full hp)
    const hpRatio = b.maxHp > 0 ? b.hp / b.maxHp : 1;
    ctx.globalAlpha = 0.35 + 0.65 * hpRatio;
    ctx.fillStyle   = BRICK_COLORS[b.row % BRICK_COLORS.length];
    ctx.strokeStyle = '#111';
    ctx.lineWidth   = 1;
    ctx.fillRect  (b.x*s,       b.y*s,       b.w*s,   b.h*s);
    ctx.strokeRect(b.x*s + 0.5, b.y*s + 0.5, b.w*s-1, b.h*s-1);
    // Show remaining hits when more than 1 hit is required
    if (b.maxHp > 1) {
      ctx.globalAlpha = 1;
      ctx.fillStyle   = 'rgba(255,255,255,0.9)';
      ctx.font        = `bold ${8 * s}px monospace`;
      ctx.textAlign   = 'center';
      ctx.fillText(b.hp, (b.x + b.w/2)*s, (b.y + b.h * 0.72)*s);
    }
    ctx.globalAlpha = 1;
  }

  // ── Paddles ──────────────────────────────────────────────────────────────────
  for (const id in state.players) {
    const p    = state.players[id];
    const padW = p.padW || PAD_W;
    const isMe = id === myId;
    ctx.fillStyle = isMe ? p.color : p.color + '88';  // others slightly transparent
    ctx.fillRect(p.paddleX*s, PAD_Y*s, padW*s, PAD_H*s);

    // Player label above paddle
    ctx.fillStyle  = isMe ? '#fff' : '#aaa';
    ctx.font       = `${10 * s}px monospace`;
    ctx.textAlign  = 'center';
    ctx.fillText(p.name, (p.paddleX + padW/2)*s, (PAD_Y - 3)*s);
  }

  // ── Balls ─────────────────────────────────────────────────────────────────────
  for (const ball of (state.balls || [])) {
    ctx.beginPath();
    ctx.arc(ball.x*s, ball.y*s, BALL_R*s, 0, Math.PI*2);
    ctx.fillStyle = '#fff';
    ctx.fill();
  }

  // ── Score board (top-right) ───────────────────────────────────────────────
  const players = Object.values(state.players);
  ctx.font      = `${11 * s}px monospace`;
  ctx.textAlign = 'right';
  players.forEach((p, i) => {
    ctx.fillStyle = p.id === myId ? p.color : '#aaa';
    ctx.fillText(
      p.name + ': ' + (state.scores[p.id] ?? 0),
      (LW - 6) * s,
      (16 + i * 14) * s
    );
  });
}

draw();
</script>
</body>
</html>
